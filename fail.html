<!doctype html>
<html lang="ru">
<head>
<script src="/assets/js/analytics-init.js?v=20260305a" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ошибка оплаты - GPTишка</title>
<link rel="stylesheet" href="/assets/css/status-pages.css?v=20260310a" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" href="/assets/img/logo.png" />
<style>
  /* Defensive fallback: never render support widgets on payment status pages. */
  #gptishka-support-widget,
  .support-widget,
  .gptishka-support-widget,
  [data-support-widget],
  [data-widget="support"],
  img[src*="assistant-cat-left"],
  img[src*="assistant-cat"] {
    display: none !important;
  }
</style>
</head>
<body class="status-page status-page--center">
<noscript><div><img src="https://mc.yandex.ru/watch/106969126" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
  <section class="status-card status-card--compact">
    <h1 class="status-title status-title--error">Ошибка оплаты</h1>
    <p class="status-text">Платеж не был завершен. Вы можете повторить попытку.</p>
    <div class="meta">Номер заказа: <strong id="orderId">—</strong></div>
    <div class="status failed">Оплата не подтверждена.</div>
    <div class="status-actions">
      <a class="btn primary" href="/payment.html">Попробовать снова</a>
      <a class="btn" href="/">На главную</a>
    </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = String(params.get("order_id") || params.get("orderId") || "").trim() || "—";
    const SUPPORT_WIDGET_SELECTORS = [
      "#gptishka-support-widget",
      ".support-widget",
      ".gptishka-support-widget",
      "[data-support-widget]",
      "[data-widget='support']",
      ".assistant-widget",
      ".gptishka-assistant-widget",
    ];

    const orderIdEl = document.getElementById("orderId");
    if (orderIdEl) orderIdEl.textContent = orderId;

    removeInjectedSupportUi();
    const supportObserver = new MutationObserver(() => {
      removeInjectedSupportUi();
    });
    supportObserver.observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(() => {
      supportObserver.disconnect();
    }, 35000);

    function removeInjectedSupportUi() {
      const selector = SUPPORT_WIDGET_SELECTORS.join(",");
      if (selector) {
        document.querySelectorAll(selector).forEach((node) => node.remove());
      }

      document.querySelectorAll('img[src*="assistant-cat-left"], img[src*="assistant-cat"]').forEach((img) => {
        const host = img.closest("aside, section, article, div");
        if (host && !host.classList.contains("status-card")) {
          host.remove();
          return;
        }
        img.remove();
      });

      document.querySelectorAll('a[href*="t.me/gptishkasupp"]').forEach((link) => {
        const host = link.closest("aside, section, article, div");
        if (!host || host.classList.contains("status-card")) return;
        host.remove();
      });
    }
  </script>
</body>
</html>
