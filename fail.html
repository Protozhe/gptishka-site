<meta charset="UTF-8">

  <title>Ошибка оплаты</title>
  <style>
    :root {
      --text: #f4f8ff;
      --muted: #aab0c0;
      --border: rgba(255, 255, 255, 0.12);
      --danger: #ff8f9f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(79, 172, 254, 0.06), transparent 45%),
        #0e1014;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -24%;
      pointer-events: none;
      z-index: -1;
    }
    body::before {
      background:
        radial-gradient(circle at 22% 28%, rgba(88, 101, 242, 0.1), transparent 54%),
        radial-gradient(circle at 78% 66%, rgba(79, 172, 254, 0.08), transparent 58%);
      filter: blur(120px);
      opacity: 0.08;
    }
    body::after {
      background:
        radial-gradient(circle at 18% 76%, rgba(88, 101, 242, 0.08), transparent 56%),
        radial-gradient(circle at 84% 24%, rgba(79, 172, 254, 0.06), transparent 58%);
      filter: blur(120px);
      opacity: 0.06;
      z-index: -2;
    }
    .wrap { max-width: 760px; margin: 48px auto; padding: 24px; }
    .card {
      background: rgba(20, 22, 28, 0.6);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .err { color: var(--danger); font-size: 24px; margin: 0 0 12px; }
    .meta { color: var(--muted); margin: 8px 0; }
    .btn {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      display: inline-block;
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(135deg, #5865f2, #4facfe);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.38);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .btn::after {
      content: "";
      position: absolute;
      inset: -28%;
      border-radius: inherit;
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: screen;
      background:
        linear-gradient(
          116deg,
          transparent 8%,
          rgba(255, 255, 255, 0) 28%,
          rgba(255, 255, 255, 0.22) 40%,
          rgba(255, 255, 255, 0.78) 50%,
          rgba(142, 198, 255, 0.36) 62%,
          rgba(142, 198, 255, 0) 74%
        ),
        linear-gradient(
          62deg,
          transparent 16%,
          rgba(174, 148, 255, 0) 36%,
          rgba(174, 148, 255, 0.62) 52%,
          rgba(174, 148, 255, 0) 70%
        );
      transition: opacity 0.22s ease;
    }
    .btn:hover {
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.44);
      transform: translateY(-2px);
      filter: brightness(1.05);
    }
    .btn:hover::after,
    .btn:focus-visible::after {
      opacity: 0.9;
      animation: failPulseBeamSweep 1.45s cubic-bezier(0.32, 0, 0.2, 1) infinite;
    }
    @keyframes failPulseBeamSweep {
      0% {
        background-position: -220% 0, -180% 0;
      }
      100% {
        background-position: 220% 0, 180% 0;
      }
    }
    code {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
<link rel="icon" href="/favicon.ico" sizes="any" />
