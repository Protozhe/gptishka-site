<!doctype html>

<head>

<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка оплаты</title>
  <style>
    :root {
      --text: #111827;
      --muted: #475569;
      --border: rgba(255, 255, 255, 0.62);
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", Arial, sans-serif;
      background:
        radial-gradient(160% 120% at 50% -20%, rgba(248, 251, 255, 0.98) 0%, rgba(240, 245, 251, 0.86) 44%, rgba(231, 238, 247, 0.92) 100%),
        linear-gradient(170deg, #eef3f8 0%, #e7edf5 48%, #dee6ef 100%);
      color: var(--text);
      overflow: hidden;
      position: relative;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -24%;
      pointer-events: none;
      z-index: -1;
    }
    body::before {
      background:
        radial-gradient(circle at 16% 34%, rgba(255, 255, 255, 0.7), transparent 52%),
        radial-gradient(circle at 82% 18%, rgba(198, 220, 244, 0.38), transparent 50%);
      filter: blur(118px);
      opacity: 0.56;
    }
    body::after {
      background:
        radial-gradient(circle at 72% 68%, rgba(120, 170, 255, 0.2), transparent 46%),
        radial-gradient(circle at 22% 76%, rgba(120, 220, 200, 0.16), transparent 42%);
      filter: blur(132px);
      opacity: 0.44;
      z-index: -2;
    }
    .wrap { max-width: 760px; margin: 48px auto; padding: 24px; }
    .card {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(248, 252, 255, 0.5)),
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.5), transparent 68%);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 46px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(16px) saturate(132%);
      -webkit-backdrop-filter: blur(16px) saturate(132%);
    }
    .err { color: var(--danger); font-size: 24px; margin: 0 0 12px; }
    .meta { color: var(--muted); margin: 8px 0; }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(20, 133, 118, 0.42);
      background: linear-gradient(180deg, #189d89 0%, #138a78 100%);
      box-shadow: 0 12px 24px rgba(19, 138, 120, 0.24);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    code {
      background: rgba(241, 245, 249, 0.8);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" href="/assets/img/logo.png" />
</head>
<body>
<noscript><div><img src="https://mc.yandex.ru/watch/106969126" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
  <div class="wrap">
    <div class="card">
      <h1 class="err">Ошибка оплаты</h1>
      <p class="meta">Платеж не был завершен. Вы можете повторить попытку.</p>
      <p class="meta">Номер заказа: <code id="orderId">—</code></p>
      <a class="btn" href="/">Попробовать снова</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get("orderId") || params.get("order_id") || "—";
    document.getElementById("orderId").textContent = orderId;
  </script>
</body>
