<meta charset="UTF-8">

  <title>Ошибка оплаты</title>
  <style>
    :root {
      --text: #f4f8ff;
      --muted: #aab0c0;
      --border: rgba(255, 255, 255, 0.12);
      --danger: #ff8f9f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", Arial, sans-serif;
      background:
        radial-gradient(60rem 42rem at 12% -8%, rgba(42, 91, 255, 0.24), rgba(42, 91, 255, 0) 62%),
        radial-gradient(56rem 40rem at 92% 12%, rgba(79, 172, 254, 0.2), rgba(79, 172, 254, 0) 66%),
        radial-gradient(58rem 40rem at 52% 108%, rgba(69, 109, 255, 0.14), rgba(69, 109, 255, 0) 70%),
        linear-gradient(180deg, #0f1115 0%, #12151c 42%, #0f1115 100%);
      color: var(--text);
      overflow: hidden;
      position: relative;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -24%;
      pointer-events: none;
      z-index: -1;
    }
    body::before {
      background:
        radial-gradient(circle at 16% 34%, rgba(42, 91, 255, 0.48), transparent 56%),
        radial-gradient(circle at 82% 18%, rgba(79, 172, 254, 0.34), transparent 56%);
      filter: blur(118px);
      opacity: 0.3;
    }
    body::after {
      background:
        radial-gradient(circle at 72% 68%, rgba(38, 79, 222, 0.4), transparent 52%),
        radial-gradient(circle at 22% 76%, rgba(91, 182, 255, 0.24), transparent 52%);
      filter: blur(132px);
      opacity: 0.26;
      z-index: -2;
    }
    .wrap { max-width: 760px; margin: 48px auto; padding: 24px; }
    .card {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02)),
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.09), transparent 68%),
        rgba(14, 19, 29, 0.76);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow:
        0 20px 46px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(16px) saturate(132%);
      -webkit-backdrop-filter: blur(16px) saturate(132%);
    }
    .err { color: var(--danger); font-size: 24px; margin: 0 0 12px; }
    .meta { color: var(--muted); margin: 8px 0; }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(126, 156, 255, 0.42);
      background: linear-gradient(180deg, #2a5bff 0%, #2148d6 100%);
      box-shadow: 0 12px 24px rgba(33, 72, 214, 0.24);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .btn:hover {
      box-shadow: 0 16px 30px rgba(33, 72, 214, 0.32);
      transform: translateY(-1px);
    }
    code {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>

      <h1 class="err">Ошибка оплаты</h1>
      <p class="meta">Платеж не был завершен. Вы можете повторить попытку.</p>
      <p class="meta">Номер заказа: <code id="orderId">—</code></p>
      <a class="btn" href="/">Попробовать снова</a>
    </div>
  </div>

    const params = new URLSearchParams(window.location.search);
    const orderId = params.get("orderId") || params.get("order_id") || "—";
    document.getElementById("orderId").textContent = orderId;
  </script>
</body>
