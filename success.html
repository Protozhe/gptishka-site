<!doctype html>
<html lang="ru">
<head>
  <script src="/assets/js/analytics-init.js?v=20260305a" defer></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата обрабатывается - GPTишка</title>
  <link rel="stylesheet" href="/assets/css/status-pages.css?v=20260310a" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/assets/img/logo.png" />
  <style>
    #gptishka-support-widget,
    .support-widget,
    .gptishka-support-widget,
    [data-support-widget],
    [data-widget="support"],
    img[src*="assistant-cat-left"],
    img[src*="assistant-cat"] {
      display: none !important;
    }
  </style>
</head>
<body class="status-page status-page--center">
  <noscript>
    <div><img src="https://mc.yandex.ru/watch/106969126" style="position:absolute; left:-9999px;" alt="" /></div>
  </noscript>

  <section class="status-card">
    <h1 class="status-title">Оплата обрабатывается</h1>
    <p class="status-text">Проверяем платеж через webhook. Обычно это занимает до 30 секунд.</p>
    <div class="meta">Заказ: <strong id="orderId">-</strong></div>
    <div class="meta">Email: <strong id="emailMasked">-</strong></div>
    <div class="meta">Сумма: <strong id="amount">-</strong></div>
    <div class="status pending" id="statusText">Ожидаем подтверждение платежа...</div>
    <div class="actions">
      <a class="btn primary" href="/">На главную</a>
      <a class="btn" href="/index.html#pricing">К тарифам</a>
    </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = String(params.get("order_id") || params.get("orderId") || "").trim();
    const linkToken = String(params.get("t") || "").trim();
    const LAST_PAID_ORDER_KEY = "gptishka_last_paid_order_id";
    const CART_STORAGE_KEYS = [
      "gptishka_cart_v1",
      "gptishka_card_qty_v1",
      "selected_cart",
      "gptishka_cart_promo_v1",
      "selected_product",
    ];

    const orderIdEl = document.getElementById("orderId");
    const emailMaskedEl = document.getElementById("emailMasked");
    const amountEl = document.getElementById("amount");
    const statusEl = document.getElementById("statusText");
    const SUPPORT_WIDGET_SELECTORS = [
      "#gptishka-support-widget",
      ".support-widget",
      ".gptishka-support-widget",
      "[data-support-widget]",
      "[data-widget='support']",
      ".assistant-widget",
      ".gptishka-assistant-widget",
    ];

    removeInjectedSupportUi();
    const supportObserver = new MutationObserver(() => {
      removeInjectedSupportUi();
    });
    supportObserver.observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(() => supportObserver.disconnect(), 35000);

    if (!orderId) {
      orderIdEl.textContent = "не найден";
      statusEl.className = "status failed";
      statusEl.textContent = "Не удалось определить order_id. Откройте оплату заново.";
    } else {
      orderIdEl.textContent = orderId;
      try {
        localStorage.setItem("gptishka_activation_order_id", orderId);
        if (linkToken) localStorage.setItem(`gptishka_activation_order_token:${orderId}`, linkToken);
      } catch (_) {
        // Ignore storage write errors.
      }
      pollOrderStatus(orderId);
    }

    async function pollOrderStatus(id) {
      const startedAt = Date.now();
      const timeoutMs = 30000;
      const intervalMs = 2000;

      while (Date.now() - startedAt <= timeoutMs) {
        const done = await requestStatus(id);
        if (done) return;
        await wait(intervalMs);
      }

      statusEl.className = "status pending";
      statusEl.textContent = "Платеж еще в обработке. Обновите страницу через несколько секунд.";
    }

    async function requestStatus(id) {
      try {
        const response = await fetch(`/api/orders/${encodeURIComponent(id)}/reconcile`, { cache: "no-store" });
        if (!response.ok) return false;
        const payload = await response.json();

        const status = String(payload?.status || "PENDING").toUpperCase();
        const amount = Number(payload?.finalAmount || 0);
        const currency = String(payload?.currency || "RUB");
        const deliveryMode = String(payload?.deliveryMode || "activation").trim().toLowerCase();

        if (payload?.emailMasked) emailMaskedEl.textContent = payload.emailMasked;
        amountEl.textContent = `${formatAmount(amount)} ${currency}`;

        if (status === "PAID") {
          trackPurchaseRecord(id, payload);
          handlePaidOrder(id);
          if (deliveryMode === "vpn") {
            statusEl.className = "status paid";
            statusEl.textContent = "Оплачено. Переводим в активацию VPN...";
            try {
              localStorage.setItem("gptishka_vpn_order_id", id);
              if (linkToken) localStorage.setItem(`gptishka_vpn_order_token:${id}`, linkToken);
            } catch (_) {
              // Ignore storage write errors.
            }
            setTimeout(() => {
              const url = new URL("/store/vpn/activate", window.location.origin);
              url.searchParams.set("order_id", id);
              if (linkToken) url.searchParams.set("t", linkToken);
              window.location.href = url.toString();
            }, 1200);
            return true;
          }

          if (deliveryMode === "activation") {
            const hasBundleVpnAccess = await checkBundleVpnAccess(id);
            if (hasBundleVpnAccess) {
              statusEl.className = "status paid";
              statusEl.textContent = "Оплачено. Открываем шаги: VPN + активация подписки...";
              setTimeout(() => {
                const url = new URL("/bundle-activation.html", window.location.origin);
                url.searchParams.set("order_id", id);
                if (linkToken) url.searchParams.set("t", linkToken);
                window.location.href = url.toString();
              }, 1200);
              return true;
            }
          }

          statusEl.className = "status paid";
          statusEl.textContent = "Оплачено. Переводим на страницу активации...";
          setTimeout(() => {
            const url = new URL("/redeem-start.html", window.location.origin);
            url.searchParams.set("order_id", id);
            if (linkToken) url.searchParams.set("t", linkToken);
            window.location.href = url.toString();
          }, 1200);
          return true;
        }

        if (status === "FAILED" || status === "REFUNDED") {
          statusEl.className = "status failed";
          statusEl.textContent = status === "REFUNDED" ? "Платеж возвращен." : "Оплата не подтверждена.";
          return true;
        }

        statusEl.className = "status pending";
        statusEl.textContent = "Ожидаем подтверждение платежа...";
        return false;
      } catch (_) {
        return false;
      }
    }

    async function checkBundleVpnAccess(id) {
      try {
        const url = new URL("/api/vpn/me", window.location.origin);
        url.searchParams.set("order_id", id);
        if (linkToken) url.searchParams.set("t", linkToken);
        const response = await fetch(url.toString(), { cache: "no-store" });
        if (!response.ok) return false;
        const payload = await response.json().catch(() => ({}));
        return Boolean(String(payload?.accessLink || "").trim());
      } catch (_) {
        return false;
      }
    }

    function handlePaidOrder(id) {
      try {
        const lastPaid = String(localStorage.getItem(LAST_PAID_ORDER_KEY) || "").trim();
        if (lastPaid === id) return;
        CART_STORAGE_KEYS.forEach((key) => localStorage.removeItem(key));
        localStorage.setItem(LAST_PAID_ORDER_KEY, id);
      } catch (_) {
        // Ignore storage write errors.
      }
      resetCartUiBadge();
      notifyCartCleared();
    }

    function trackPurchaseRecord(orderId, payload) {
      const safeOrderId = String(orderId || "").trim();
      if (!safeOrderId) return;

      const trackedKey = `gptishka_purchase_tracked:${safeOrderId}`;
      try {
        if (sessionStorage.getItem(trackedKey) === "1") return;
      } catch (_) {
        // Ignore storage read errors.
      }

      const emailCandidates = [
        String(payload?.email || "").trim().toLowerCase(),
        String(localStorage.getItem("checkout_email") || "").trim().toLowerCase(),
      ];
      const email = emailCandidates.find((value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) || "";
      if (!email) return;

      fetch("/api/purchases", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, orderId: safeOrderId }),
        keepalive: true,
      }).catch(() => {
        // Tracking failures must not block activation flow.
      });

      try {
        sessionStorage.setItem(trackedKey, "1");
      } catch (_) {
        // Ignore storage write errors.
      }
    }

    function resetCartUiBadge() {
      const countEl = document.getElementById("headerCartCount");
      const totalEl = document.getElementById("headerCartTotal");
      if (countEl) countEl.textContent = "0";
      if (totalEl) totalEl.textContent = "0 RUB";
    }

    function notifyCartCleared() {
      try {
        window.dispatchEvent(new CustomEvent("gptishka:cart-cleared"));
      } catch (_) {
        // Ignore event dispatch failures.
      }
    }

    function removeInjectedSupportUi() {
      const selector = SUPPORT_WIDGET_SELECTORS.join(",");
      if (selector) document.querySelectorAll(selector).forEach((node) => node.remove());

      document.querySelectorAll('img[src*="assistant-cat-left"], img[src*="assistant-cat"]').forEach((img) => {
        const host = img.closest("aside, section, article, div");
        if (host && !host.classList.contains("status-card")) {
          host.remove();
          return;
        }
        img.remove();
      });

      document.querySelectorAll('a[href*="t.me/gptishkasupp"]').forEach((link) => {
        const host = link.closest("aside, section, article, div");
        if (!host || host.classList.contains("status-card")) return;
        host.remove();
      });
    }

    function formatAmount(value) {
      const amount = Number.isFinite(Number(value)) ? Number(value) : 0;
      const hasFraction = Math.abs(amount % 1) > 0.000001;
      return amount.toLocaleString("ru-RU", {
        minimumFractionDigits: hasFraction ? 2 : 0,
        maximumFractionDigits: 2,
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
